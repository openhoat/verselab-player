$schema: 'http://json-schema.org/draft-07/schema#'
$id: 'chords.schema.yml'
title: 'Verselab Chords'
description: 'Chord definitions — maps chord names to arrays of note names or MIDI numbers'
type: object
additionalProperties:
  type: array
  minItems: 1
  items:
    oneOf:
      - type: string
        pattern: '^[A-Ga-g][#b]?-?[0-9]+$'
        examples: [C3, Eb3, G3]
      - type: integer
        minimum: 0
        maximum: 127