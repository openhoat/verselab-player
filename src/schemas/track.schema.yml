$schema: 'http://json-schema.org/draft-07/schema#'
$id: 'track.schema.yml'
title: 'Verselab Track'
description: 'Single track file for Roland Verselab MV-1 — filename defines the track name, track number can be specified via track property or filename prefix (e.g. 4-drums.yml)'
oneOf:
  - title: 'Drum track'
    description: 'Drum pattern — each key beyond sound/category/steps/track is an instrument name mapped to a step pattern'
    type: object
    required: []
    properties:
      track:
        type: integer
        minimum: 1
        maximum: 16
        description: 'MV-1 channel number (1-16) — derived from filename prefix (e.g. 4-drums.yml → track 4) if not specified'
      clip:
        type: integer
        minimum: 1
        maximum: 16
        description: 'MV-1 clip number (1-16) — sent as Program Change (clip 1 = PC 0) to switch sections on the MV-1'
      sound:
        type: string
        description: 'Sound/preset name loaded on this track (informational only, not sent via MIDI)'
      category:
        type: string
        description: 'Sound category as shown in the MV-1 sound list (e.g. Drum Kit)'
      steps:
        type: integer
        minimum: 1
        maximum: 128
        description: 'Override loop length in steps (default: auto-detected from pattern length)'
      velocity_maps:
        oneOf:
          - type: object
            description: 'Velocity mapping per instrument (e.g. { kick: { X: 100, x: 60 }, hihat: { H: 100, h: 80 } })'
            propertyNames:
              pattern: '^(kick|snare|hihat|open_hihat|rimshot|clap|crash|ride|low_tom|mid_tom|high_tom)$'
            additionalProperties:
              type: object
              description: 'Character to velocity mapping for this instrument'
              propertyNames:
                pattern: '^[^\\s]$'
                maxLength: 1
              additionalProperties:
                type: integer
                minimum: 0
                maximum: 127
          - type: object
            description: 'Global velocity mapping for all instruments (e.g. { X: 100, x: 60 })'
            propertyNames:
              pattern: '^[^\\s]$'
              maxLength: 1
            additionalProperties:
              type: integer
              minimum: 0
              maximum: 127
    additionalProperties:
      type: string
      description: 'Step pattern (1-128 steps) — uses velocity_maps. Spaces and | ignored. Characters not in velocity_maps are treated as rest. Known names: kick, snare, hihat, open_hihat, rimshot, clap, crash, ride, low_tom, mid_tom, high_tom'
  - title: 'Melodic track (notes)'
    type: object
    required: [notes]
    additionalProperties: false
    properties:
      track:
        type: integer
        minimum: 1
        maximum: 16
        description: 'MV-1 channel number (1-16) — derived from filename prefix (e.g. 5-bass.yml → track 5) if not specified'
      clip:
        type: integer
        minimum: 1
        maximum: 16
        description: 'MV-1 clip number (1-16) — sent as Program Change (clip 1 = PC 0) to switch sections on the MV-1'
      sound:
        type: string
        description: 'Sound/preset name loaded on this track (informational only, not sent via MIDI)'
      category:
        type: string
        description: 'Sound category as shown in the MV-1 sound list (e.g. E.Bass, E.Piano1)'
      steps:
        type: integer
        minimum: 1
        maximum: 128
        description: 'Override loop length in steps (default: auto-detected from note positions)'
      transpose:
        type: integer
        minimum: -127
        maximum: 127
        description: 'Semitone offset applied to all notes on this track (e.g. 12 = +1 octave)'
      notes:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [step, vel]
          oneOf:
            - required: [note]
            - required: [chord]
          properties:
            step:
              type: integer
              minimum: 1
              maximum: 128
              description: 'Step position (1-indexed as on the MV-1 sequencer)'
            note:
              description: 'Note name (C2, G#3, Bb4...) or MIDI number (0-127)'
              oneOf:
                - type: string
                  pattern: '^[A-Ga-g][#b]?-?[0-9]+$'
                - type: integer
                  minimum: 0
                  maximum: 127
            chord:
              type: string
              description: 'Chord alias name defined in the sequence-level chords.yml'
            vel:
              type: integer
              minimum: 1
              maximum: 127
              description: 'Velocity'
            dur:
              type: number
              minimum: 0.1
              description: 'Duration in steps (default 1)'
            sta:
              type: integer
              minimum: 0
              maximum: 5
              default: 1
              description: 'Start Time Adjustment (0-5 clocks within a step), matches MV-1 timing at 24 PPQN (default: 1)'
  - title: 'Melodic track (roll)'
    description: 'Piano-roll notation — each item maps a note name to a step pattern string. Each char = 1 step; | and spaces are visual separators ignored during parsing.'
    type: object
    required: [roll]
    additionalProperties: false
    properties:
      track:
        type: integer
        minimum: 1
        maximum: 16
      clip:
        type: integer
        minimum: 1
        maximum: 16
      sound:
        type: string
      category:
        type: string
      steps:
        type: integer
        minimum: 1
        maximum: 128
        description: 'Override loop length in steps (default: auto-detected from pattern length)'
      transpose:
        type: integer
        minimum: -127
        maximum: 127
      custom:
        type: object
        description: 'Character to velocity (and optional sta) mapping. Value: integer, "vel(sta)" string, or {vel, sta} object.'
        propertyNames:
          pattern: '^[^\\s|.=]$'
          maxLength: 1
        additionalProperties:
          oneOf:
            - type: integer
              minimum: 0
              maximum: 127
              description: 'Velocity (sta defaults to 0)'
            - type: string
              pattern: '^\d+(\(\d+\))?$'
              description: 'Velocity with optional sta: "80" or "80(2)" (vel=80 sta=2)'
            - type: object
              required: [vel]
              additionalProperties: false
              properties:
                vel:
                  type: integer
                  minimum: 0
                  maximum: 127
                sta:
                  type: integer
                  minimum: 0
                  maximum: 5
      roll:
        type: array
        description: 'Ordered list of note/chord rows. Each item: {NOTE_OR_CHORD: PATTERN}. Note names (C2, G#3) are used directly; other keys are resolved as chord aliases from chords.yml.'
        items:
          type: object
          minProperties: 1
          maxProperties: 1
          propertyNames:
            pattern: '^[A-Za-z][A-Za-z0-9#b_-]*$'
            description: 'Note name (e.g. C2, G#3, Bb4) or chord alias (e.g. Am9, Fmaj7)'
          additionalProperties:
            type: string
            description: 'Step pattern — each non-separator char is 1 step. Velocity_map chars = note-on, = = sustain, . = rest, | and spaces = visual separators.'
